<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1200-TF — Sales Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b12;--sf:#13131c;--cd:#1a1a26;--bd:#252535;
  --tx:#f0f0f8;--mu:#5a6080;--r:14px;
  --mi:#3b82f6;--km:#22c55e;--sc:#f97316;
  --gr:#22c55e;--or:#f97316;--re:#ef4444;--pu:#a855f7;
  --tab-ac:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Sarabun",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ─── LOADER ─────────────────────────────────────────────── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:16px}
.spin{width:44px;height:44px;border:3px solid var(--bd);border-top-color:var(--mi);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{font-size:.9rem;color:var(--mu)}

/* ─── LOGIN ──────────────────────────────────────────────── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:400;display:none;align-items:center;justify-content:center}
#loginScreen.show{display:flex}
.login-wrap{width:100%;max-width:420px;padding:24px 20px}
.login-logo{font-family:"Space Mono",monospace;font-size:1.6rem;font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:6px}
.login-sub{font-size:.8rem;color:var(--mu);text-align:center;margin-bottom:32px}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:28px 24px;display:flex;flex-direction:column;gap:14px}
.login-box h2{font-size:1rem;font-weight:700}
.field-lbl{font-size:.73rem;color:var(--mu);margin-bottom:5px}
.field-inp{width:100%;padding:11px 16px;background:var(--cd);border:1.5px solid var(--bd);border-radius:10px;color:var(--tx);font-family:"Sarabun",sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.field-inp:focus{border-color:var(--tab-ac)}
.login-btn{width:100%;padding:13px;background:var(--tab-ac);border:none;border-radius:10px;color:#fff;font-family:"Sarabun",sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px}
.login-btn:hover{opacity:.85}
.login-btn:disabled{opacity:.45;cursor:not-allowed}
.login-err{color:#f87171;font-size:.78rem;min-height:18px;text-align:center}
.login-hint{font-size:.72rem;color:var(--mu);text-align:center;line-height:1.6}

/* ─── HEADER ─────────────────────────────────────────────── */
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px #0008}
.hdr-inner{max-width:1440px;margin:auto;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-family:"Space Mono",monospace;font-size:1.1rem;color:#fff;letter-spacing:2px;font-weight:700}
.update-badge{font-size:.7rem;color:var(--mu);background:var(--cd);padding:3px 10px;border-radius:50px;border:1px solid var(--bd)}
.update-badge b{color:var(--tx)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.user-chip{font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:50px;display:flex;align-items:center;gap:7px;border:1.5px solid var(--bd);background:var(--cd);white-space:nowrap}
.role-badge{font-size:.62rem;padding:2px 7px;border-radius:50px;font-weight:700}
.rb-master  {background:#a855f720;color:#c084fc;border:1px solid #a855f740}
.rb-admin   {background:#3b82f620;color:#60a5fa;border:1px solid #3b82f640}
.rb-sale    {background:#22c55e20;color:#4ade80;border:1px solid #22c55e40}
.rb-customer{background:#f9731620;color:#fb923c;border:1px solid #f9731640}
.online-pill{display:none;align-items:center;gap:5px;padding:5px 12px;border:1.5px solid #22c55e40;border-radius:50px;background:#22c55e10;cursor:pointer}
.online-pill:hover{background:#22c55e20}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.online-cnt{font-size:.72rem;color:var(--gr);font-weight:700}
.logout-btn{padding:6px 14px;background:transparent;border:1.5px solid var(--bd);border-radius:50px;color:var(--mu);font-family:"Sarabun",sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--re);color:var(--re)}
.search-wrap{max-width:1440px;margin:0 auto;padding:6px 20px 12px}
.search-wrap input{width:100%;padding:10px 18px;border-radius:50px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-family:"Sarabun",sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--tab-ac)}
.search-wrap input::placeholder{color:var(--mu)}

/* ─── TABS ───────────────────────────────────────────────── */
.tabs-bar{background:var(--sf);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs-inner{max-width:1440px;margin:auto;padding:0 20px;display:flex}
.tab-btn{padding:12px 22px;font-family:"Sarabun",sans-serif;font-size:.88rem;font-weight:600;border:none;background:none;color:var(--mu);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab-btn:hover{color:var(--tx)}
.tab-btn.active{color:var(--tx);border-bottom-color:var(--tab-ac)}
.tab-cnt{font-size:.7rem;background:var(--cd);padding:2px 8px;border-radius:50px;border:1px solid var(--bd)}
.tab-btn.active .tab-cnt{background:var(--tab-ac);color:#fff;border-color:transparent}

/* ─── FILTER BAR ─────────────────────────────────────────── */
.filter-bar{max-width:1440px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cat-pill{padding:5px 14px;border-radius:50px;background:var(--cd);border:1.5px solid var(--bd);color:var(--tx);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-pill:hover,.cat-pill.active{background:var(--tab-ac);color:#fff;border-color:var(--tab-ac)}
.stock-filter{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--mu);cursor:pointer;padding:5px 12px;background:var(--cd);border:1.5px solid var(--bd);border-radius:50px;transition:all .2s;margin-left:auto;white-space:nowrap}
.stock-filter.active{border-color:var(--gr);color:var(--gr)}
.stock-filter input{accent-color:var(--gr)}
.sort-sel{padding:5px 12px;border-radius:50px;background:var(--cd);border:1.5px solid var(--bd);color:var(--tx);font-size:.78rem;font-weight:600;cursor:pointer;font-family:"Sarabun",sans-serif;outline:none}

/* ─── CATALOG GRID / CARD ────────────────────────────────── */
.main{max-width:1440px;margin:0 auto;padding:20px 20px 80px}
.tab-panel{display:none}.tab-panel.active{display:block}
.cat-sec{margin-bottom:48px}
.cat-title{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.cat-cnt{margin-left:auto;font-size:.72rem;font-weight:400;color:var(--mu);background:var(--cd);padding:3px 10px;border-radius:50px;border:1px solid var(--bd)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.card{background:var(--cd);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 36px #0007;border-color:var(--tab-ac)}
.card.hidden{display:none!important}
.card-img{height:180px;background:var(--sf);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:contain;padding:6px;transition:transform .3s;display:block;background:var(--sf)}
.card:hover .card-img img{transform:scale(1.07)}
.no-img{color:var(--mu);text-align:center;font-size:2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:6px}
.no-img small{font-size:.6rem;font-family:"Space Mono",monospace;word-break:break-all;padding:0 8px;text-align:center}
.out-banner{position:absolute;bottom:0;left:0;right:0;background:#ef444490;backdrop-filter:blur(4px);text-align:center;font-size:.72rem;font-weight:700;padding:4px;color:#fff}
.card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;flex:1}
.card-sku{font-family:"Space Mono",monospace;font-size:.7rem;color:var(--tab-ac);word-break:break-all;line-height:1.5}
.card-name{font-size:.8rem;color:var(--mu);line-height:1.4}
.stock-wrap{display:flex;align-items:center;gap:7px;min-height:22px}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--gr);box-shadow:0 0 7px #22c55e80}
.dot-low{background:var(--or);box-shadow:0 0 7px #f9731680}
.dot-zero{background:var(--re);box-shadow:0 0 7px #ef444480}
.stock-label{font-size:.75rem;font-weight:600;padding:3px 9px;border-radius:50px;display:none;align-items:center;gap:3px}
body.show-stock .stock-label{display:inline-flex}
body:not(.show-stock) .dot{display:none}
body:not(.show-stock) .out-banner{display:none}
.sk-ok{background:#22c55e18;color:var(--gr)}
.sk-low{background:#f9731618;color:var(--or)}
.sk-zero{background:#ef444418;color:var(--re)}
.copy-btn{padding:7px;background:transparent;border:1.5px solid var(--bd);border-radius:8px;color:var(--tx);font-family:"Sarabun",sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%;margin-top:auto}
.copy-btn:hover{background:var(--tab-ac);color:#fff;border-color:var(--tab-ac)}

/* ─── LIGHTBOX ───────────────────────────────────────────── */
#lb-overlay{display:none;position:fixed;inset:0;background:#000d;backdrop-filter:blur(14px);z-index:600;align-items:center;justify-content:center;padding:16px}
#lb-overlay.on{display:flex}
.lb-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:18px;overflow:hidden;max-width:520px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 64px #0009;position:relative}
.lb-img-wrap{flex:1;min-height:220px;max-height:380px;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:12px}
.lb-img-wrap img{max-width:100%;max-height:360px;object-fit:contain;border-radius:8px}
.lb-no-img{color:var(--mu);text-align:center;font-size:2.5rem;padding:40px}
.lb-info{padding:16px 20px 20px;border-top:1px solid var(--bd)}
.lb-sku{font-family:"Space Mono",monospace;font-size:.72rem;color:var(--tab-ac);margin-bottom:4px}
.lb-name{font-size:1rem;font-weight:600;margin-bottom:12px;line-height:1.4}
.lb-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.lb-price{font-family:"Space Mono",monospace;font-size:1.1rem;font-weight:700}
.lb-stock-badge{font-size:.8rem;font-weight:600;padding:4px 14px;border-radius:50px}
.lb-cat{font-size:.75rem;color:var(--mu);margin-top:8px}
.lb-close{position:absolute;top:12px;right:12px;background:#fff2;border:none;color:#fff;font-size:1rem;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ─── REPORT ─────────────────────────────────────────────── */
.report-wrap{margin-top:48px;display:none}
body.show-stock .report-wrap{display:block}
.rpt-head{font-size:1rem;font-weight:700;margin-bottom:12px;padding-top:8px;border-top:1px solid var(--bd)}
.rpt-toggle{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:12px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:2px}
.rpt-toggle:hover{border-color:var(--tab-ac)}
.rpt-toggle h3{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:8px}
.rpt-cnt{font-size:.75rem;font-weight:400;color:var(--mu)}
.rpt-body{background:var(--cd);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);display:none}
.rpt-body.open{display:block}
.rpt-table{width:100%;border-collapse:collapse;font-size:.75rem}
.rpt-table th{background:#ffffff07;padding:7px 12px;text-align:left;font-weight:700;color:var(--mu);border-bottom:1px solid var(--bd)}
.rpt-table td{padding:7px 12px;border-bottom:1px solid var(--bd);font-family:"Space Mono",monospace;font-size:.68rem}
.rpt-table tr:last-child td{border-bottom:none}
.rpt-empty{padding:16px;text-align:center;color:var(--mu);font-size:.82rem}

/* ─── ANALYTICS ──────────────────────────────────────────── */
.dash-kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:28px}
.kpi-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px}
.kpi-lbl{font-size:.72rem;color:var(--mu);margin-bottom:6px}
.kpi-val{font-family:"Space Mono",monospace;font-size:1.5rem;font-weight:700;line-height:1.2}
.kpi-sub{font-size:.7rem;color:var(--mu);margin-top:4px}
.chart-box{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:18px}
.chart-ttl{font-size:.88rem;font-weight:700;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:.77rem}
.bar-lbl{width:155px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:16px;background:var(--bd);border-radius:50px;overflow:hidden}
.bar-fill{height:100%;border-radius:50px;transition:width .5s ease}
.bar-fill.ok{background:var(--gr)}
.bar-fill.warn{background:var(--or)}
.bar-fill.danger{background:var(--re)}
.bar-fill.blue{background:var(--mi)}
.bar-num{width:72px;text-align:right;font-family:"Space Mono",monospace;font-size:.68rem;color:var(--mu);flex-shrink:0}
.tbl-wrap{overflow-x:auto}
.dtbl{width:100%;border-collapse:collapse;font-size:.78rem}
.dtbl th{background:#ffffff07;padding:8px 12px;text-align:left;font-weight:700;color:var(--mu);border-bottom:1px solid var(--bd);white-space:nowrap}
.dtbl td{padding:8px 12px;border-bottom:1px solid var(--bd)}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr:hover td{background:#ffffff04}
.tag{font-size:.65rem;padding:2px 8px;border-radius:50px;font-weight:700}
.tag-ok{background:#22c55e18;color:var(--gr)}
.tag-warn{background:#f9731618;color:var(--or)}
.tag-zero{background:#ef444418;color:var(--re)}

/* ─── MASTER PANEL ───────────────────────────────────────── */
.master-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:860px){.master-grid{grid-template-columns:1fr}}
.ms-box{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:20px}
.ms-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ms-ttl{font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:7px}
.mbtn{padding:7px 14px;background:var(--tab-ac);border:none;border-radius:8px;color:#fff;font-family:"Sarabun",sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.mbtn:hover{opacity:.8}
.mbtn.sm{padding:4px 10px;font-size:.7rem;border-radius:6px}
.mbtn.danger{background:var(--re)}
.mbtn.warn{background:var(--or)}
.mbtn.neutral{background:var(--bd);color:var(--mu)}
.online-list{display:flex;flex-direction:column;gap:8px}
.online-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--sf);border-radius:8px;font-size:.78rem}
.wk-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.77rem}
.wk-lbl{width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wk-bar{flex:1;height:14px;background:var(--bd);border-radius:50px;overflow:hidden}
.wk-fill{height:100%;background:var(--pu);border-radius:50px}
.wk-num{width:70px;text-align:right;font-family:"Space Mono",monospace;font-size:.68rem;color:var(--mu)}
.alert-tag{font-size:.65rem;padding:2px 8px;border-radius:50px;font-weight:700;white-space:nowrap}
.at-dup   {background:#ef444420;color:#f87171;border:1px solid #ef444440}
.at-login {background:#22c55e20;color:#4ade80;border:1px solid #22c55e40}
.at-logout{background:#5a608020;color:var(--mu);border:1px solid #5a608040}
.at-other {background:#3b82f620;color:#60a5fa;border:1px solid #3b82f640}

/* ─── MODAL ──────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:#000c;backdrop-filter:blur(8px);z-index:700;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.show{display:flex}
.modal-box{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:28px 24px;width:100%;max-width:400px}
.modal-ttl{font-size:1rem;font-weight:700;margin-bottom:20px}
.modal-field{margin-bottom:14px}
.modal-row{display:flex;gap:10px;margin-top:20px}
.modal-row button{flex:1;padding:11px;border-radius:10px;font-family:"Sarabun",sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;border:none}
.btn-save{background:var(--tab-ac);color:#fff}
.btn-save:hover{opacity:.85}
.btn-cancel{background:var(--bd);color:var(--mu)}
.role-select{width:100%;padding:11px 14px;background:var(--cd);border:1.5px solid var(--bd);border-radius:10px;color:var(--tx);font-family:"Sarabun",sans-serif;font-size:.88rem;outline:none}
.role-select:focus{border-color:var(--tab-ac)}

/* ─── MISC ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--tab-ac);color:#fff;padding:11px 20px;border-radius:10px;font-weight:600;font-size:.85rem;box-shadow:0 8px 30px #0007;transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.175,.885,.32,1.275);z-index:9999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.warn{background:var(--or)}
.toast.err{background:var(--re)}
.empty-msg{text-align:center;padding:70px 20px;color:var(--mu)}
.sec-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .card-img{height:150px}
  .main{padding:14px 12px 60px}
  .hdr-inner{padding:10px 14px}
}
</style>
</head>
<body>

<!-- ═══════════════ LOADER ═══════════════════════════════ -->
<div id="loader">
  <div class="spin"></div>
  <p id="loaderMsg" style="margin-bottom:12px">กำลังโหลดข้อมูลสินค้า...</p>
  <div style="width:260px;background:#252535;border-radius:50px;height:6px;overflow:hidden">
    <div id="loaderBar" style="height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:50px;transition:width .4s ease"></div>
  </div>
  <p id="loaderPct" style="font-size:.72rem;color:#5a6080;margin-top:8px">0%</p>
  <p id="loaderEta" style="font-size:.7rem;color:#3b3d52;margin-top:2px"></p>
</div>

<!-- ═══════════════ LOGIN SCREEN ════════════════════════ -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">1200-TF</div>
    <div class="login-sub">Sales Catalog System</div>
    <div class="login-box">
      <h2>🔐 เข้าสู่ระบบ</h2>
      <div>
        <div class="field-lbl">Username</div>
        <input class="field-inp" id="inUser" type="text" placeholder="กรอก username" autocapitalize="none" autocomplete="username">
      </div>
      <div>
        <div class="field-lbl">Password</div>
        <input class="field-inp" id="inPass" type="password" placeholder="กรอก password" autocomplete="current-password">
      </div>
      <div class="login-err" id="loginErr"></div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="login-hint">ลูกค้า: ใช้รหัสที่ได้รับจากทีมขาย | พนักงาน: ติดต่อ Master Admin</div>
    </div>
  </div>
</div>

<!-- ═══════════════ LIGHTBOX ════════════════════════════ -->
<div id="lb-overlay" onclick="lbBg(event)">
  <div class="lb-wrap">
    <button class="lb-close" onclick="closeLB()">✕</button>
    <div class="lb-img-wrap" id="lb-img-wrap"></div>
    <div class="lb-info">
      <div class="lb-sku" id="lb-sku"></div>
      <div class="lb-name" id="lb-name"></div>

<!-- ═══════════════ JAVASCRIPT ══════════════════════════ -->
<script>
// ─────────────────────────────────────────────────────────
// 📌 CONFIG — แก้ค่า AUTH_API_URL หลัง Deploy Web App
// ─────────────────────────────────────────────────────────
var AUTH_API_URL = "https://script.google.com/macros/s/AKfycbwhC0EZbfccImEiaXrMy5wJoonsOEIkY4hfPB4SnvfKhX2x2NehOgHiAmtHh_peEASQmQ/exec";
var DATA_URL     = "data/catalog.json";
var SCRAP_KEY    = "ลงข้อมูล WIP-S26";
var LOW_QTY      = 5;

// ─── STATE ───────────────────────────────────────────────
var catalog     = null;
var curTab      = "mi";
var curCat      = "all";
var authToken   = sessionStorage.getItem("auth_token")   || "";
var authRole    = sessionStorage.getItem("auth_role")    || "";
var authDisplay = sessionStorage.getItem("auth_display") || "";
var authUser    = sessionStorage.getItem("auth_user")    || "";
var _editingUser = null; // username กำลัง edit อยู่

// role hierarchy: customer=0, sale=1, admin=2, master=3
var ROLE_ORD = { customer:0, sale:1, admin:2, master:3 };
function roleGte(r){ return (ROLE_ORD[authRole]||0) >= (ROLE_ORD[r]||0); }

// ─── LOADER ──────────────────────────────────────────────
var _loadStart=Date.now(), _barPct=0, _barTmr=null;
function _tickBar(target, msg){
  clearInterval(_barTmr);
  _barTmr = setInterval(function(){
    if(_barPct>=target){clearInterval(_barTmr);return;}
    _barPct = Math.min(_barPct + (_barPct < target ? (target-_barPct)*0.12+0.3 : 0), target);
    var p=Math.round(_barPct);
    var b=document.getElementById("loaderBar");
    var pe=document.getElementById("loaderPct");
    var ee=document.getElementById("loaderEta");
    if(b)  b.style.width=_barPct+"%";
    if(pe) pe.textContent=p+"%";
    if(ee&&p<100){
      var el=(Date.now()-_loadStart)/1000;
      var eta=p>5?Math.max(0,Math.round(el/p*(100-p))):null;
      ee.textContent=eta!==null?"เหลืออีก ~"+eta+" วินาที":"";
    }
    if(msg) document.getElementById("loaderMsg").textContent=msg;
  }, 60);
}
_tickBar(30,"กำลังโหลดข้อมูลสินค้า...");

// ─── FETCH CATALOG DATA ───────────────────────────────────
fetch(DATA_URL+"?t="+Date.now())
  .then(function(r){
    _tickBar(60,"กำลังประมวลผลข้อมูล...");
    if(!r.ok) throw new Error("HTTP "+r.status+" — รัน Full Sync ก่อนนะครับ");
    return r.json();
  })
  .then(function(data){
    _tickBar(85,"กำลังเตรียมแสดงสินค้า...");
    catalog=data;
    setTimeout(function(){
      _tickBar(100,"โหลดเสร็จแล้ว! ✅");
      document.getElementById("loaderEta").textContent="";
      document.getElementById("loaderPct").textContent="100%";
      if(data.updatedAt){
        var d=new Date(data.updatedAt);
        document.getElementById("updatedAt").textContent=
          d.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+
          d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
      }
      var ci=function(a){return a.filter(function(i){return i.imageUrl;}).length;};
      var mi=(data["MI"]||[]), km=(data["KM"]||[]), sc=(data[SCRAP_KEY]||[]);
      document.getElementById("cnt-mi").textContent    = ci(mi)+"/"+mi.length;
      document.getElementById("cnt-km").textContent    = ci(km)+"/"+km.length;
      document.getElementById("cnt-scrap").textContent = ci(sc)+"/"+sc.length;
      setTimeout(function(){
        document.getElementById("loader").style.display="none";
        if(authToken) verifyAndShow();
        else          showLogin();
      },400);
    },300);
  })
  .catch(function(e){
    clearInterval(_barTmr);
    var el=document.getElementById("loaderMsg");
    el.textContent="⚠️ "+e.message; el.style.color="#f87171";
    document.getElementById("loaderPct").textContent="";
    document.getElementById("loaderEta").textContent="";
  });

// ─── AUTH API CALL ────────────────────────────────────────
function apiCall(action, body){
  if(!AUTH_API_URL||AUTH_API_URL==="YOUR_GAS_WEB_APP_URL_HERE")
    return Promise.reject(new Error("❌ ยังไม่ได้ตั้งค่า AUTH_API_URL ใน index.html\n(Deploy Web App แล้ว copy URL มาวาง)"));
  var payload = encodeURIComponent(JSON.stringify(Object.assign({action:action},body||{})));
  return fetch(AUTH_API_URL+"?payload="+payload+"\u0026t="+Date.now())
    .then(function(r){return r.json();});
}

// ─── LOGIN ────────────────────────────────────────────────
function showLogin(){
  document.getElementById("mainApp").style.display="none";
  document.getElementById("loginScreen").classList.add("show");
  setTimeout(function(){document.getElementById("inUser").focus();},100);
}

["inUser","inPass"].forEach(function(id){
  document.addEventListener("DOMContentLoaded",function(){
    var el=document.getElementById(id);
    if(el) el.addEventListener("keydown",function(e){if(e.key==="Enter") doLogin();});
  });
});
// fallback for early binding
window.addEventListener("load",function(){
  ["inUser","inPass"].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.addEventListener("keydown",function(e){if(e.key==="Enter") doLogin();});
  });
});

function doLogin(){
  var username=document.getElementById("inUser").value.trim();
  var password=document.getElementById("inPass").value.trim();
  var errEl=document.getElementById("loginErr");
  var btn=document.getElementById("loginBtn");
  errEl.textContent="";
  if(!username||!password){errEl.textContent="กรุณากรอก username และ password";return;}
  btn.disabled=true; btn.textContent="กำลังเข้าสู่ระบบ...";
  apiCall("login",{username:username,password:password})
    .then(function(res){
      btn.disabled=false; btn.textContent="เข้าสู่ระบบ";
      if(!res.ok){errEl.textContent=res.error||"เกิดข้อผิดพลาด";return;}
      _saveAuth(res.token,res.role,res.displayName,res.username);
      document.getElementById("loginScreen").classList.remove("show");
      document.getElementById("inPass").value="";
      showApp();
      if(res.duplicate) showToast("⚠️ มีการ Login ซ้อน — session เดิมถูก kick ออก","warn");
      else              showToast("👋 ยินดีต้อนรับ "+res.displayName);
    })
    .catch(function(e){
      btn.disabled=false; btn.textContent="เข้าสู่ระบบ";
      errEl.textContent=e.message;
    });
}

function verifyAndShow(){
  apiCall("verify",{token:authToken})
    .then(function(res){
      if(res.ok){
        _saveAuth(authToken,res.role,res.displayName,res.username);
        showApp();
      } else { clearAuth(); showLogin(); }
    })
    .catch(function(){ showLogin(); });
}

function doLogout(){
  apiCall("logout",{token:authToken}).catch(function(){});
  clearAuth();
  showLogin();
  showToast("🔒 ออกจากระบบแล้ว");
}

function _saveAuth(token,role,display,user){
  authToken=token; authRole=role; authDisplay=display; authUser=user;
  sessionStorage.setItem("auth_token",token);
  sessionStorage.setItem("auth_role",role);
  sessionStorage.setItem("auth_display",display);
  sessionStorage.setItem("auth_user",user);
}
function clearAuth(){
  authToken=authRole=authDisplay=authUser="";
  sessionStorage.clear();
}

// ─── SHOW APP (after login) ───────────────────────────────
function showApp(){
  document.getElementById("mainApp").style.display="block";
  // body class ตาม role
  document.body.classList.remove("show-stock");
  if(roleGte("sale")) document.body.classList.add("show-stock");
  // header
  document.getElementById("userDisplay").textContent=authDisplay||authUser;
  var rb=document.getElementById("userRoleBadge");
  var rl={master:"🟣 Master",admin:"🔵 Admin",sale:"🟢 Sale",customer:"🟠 Customer"};
  rb.textContent=rl[authRole]||authRole;
  rb.className="role-badge rb-"+authRole;
  // tabs visibility
  document.getElementById("tab-analytics").style.display=roleGte("admin") ?"":"none";
  document.getElementById("tab-master").style.display   =roleGte("master")?"":"none";
  // stock filter: sale+
  document.getElementById("sfBtn").style.display=roleGte("sale")?"":"none";
  // online pill: master only
  if(roleGte("master")){
    document.getElementById("onlinePill").style.display="flex";
    _refreshOnline();
    setInterval(_refreshOnline,60000);
  }
  renderTab("mi");
}

function _refreshOnline(){
  apiCall("getOnline",{token:authToken})
    .then(function(res){
      if(!res.ok) return;
      var cnt=res.online.length;
      document.getElementById("onlineCnt").textContent=cnt+" online";
      document.getElementById("cnt-master").textContent=cnt||"";
    }).catch(function(){});
}

// ─── RENDER CATALOG ───────────────────────────────────────
function renderTab(tab){
  curTab=tab; curCat="all";
  var colors={mi:"#3b82f6",km:"#22c55e",scrap:"#f97316",analytics:"#a855f7",master:"#a855f7"};
  document.documentElement.style.setProperty("--tab-ac",colors[tab]||"#3b82f6");
  ["mi","km","scrap","analytics","master"].forEach(function(t){
    var b=document.getElementById("tab-"+t), p=document.getElementById("panel-"+t);
    if(b) b.classList.toggle("active",t===tab);
    if(p) p.classList.toggle("active",t===tab);
  });
  var fb=document.getElementById("filterBar");
  fb.style.display=(tab==="analytics"||tab==="master")?"none":"";
  document.getElementById("searchWrap").style.display=(tab==="analytics"||tab==="master")?"none":"";
  if(tab==="analytics"){renderAnalytics();return;}
  if(tab==="master")   {renderMasterPanel();return;}

  var rawKey=tab==="scrap"?SCRAP_KEY:tab.toUpperCase();
  var items=(catalog&&catalog[rawKey])||[];
  if(!items.length){
    document.getElementById("panel-"+tab).innerHTML="<div class='empty-msg'>ไม่มีข้อมูลสินค้า<br><small style='color:var(--mu)'>รัน Full Sync ใน Apps Script ก่อน</small></div>";
    document.getElementById("catPills").innerHTML="";
    return;
  }
  var sortBy=(document.getElementById("sortSel")||{value:"sku"}).value;
  var sorted=items.slice().sort(function(a,b){
    if(sortBy==="name")       return (a.name||"").localeCompare(b.name||"","th");
    if(sortBy==="price-asc")  return (a.price||0)-(b.price||0);
    if(sortBy==="price-desc") return (b.price||0)-(a.price||0);
    if(sortBy==="stock-desc") return (b.qty||0)-(a.qty||0);
    return (a.sku||"").localeCompare(b.sku||"",undefined,{numeric:true});
  });
  sorted.forEach(function(item){
    if(!item.category||item.category==="ไม่ระบุ") item.category=categorizeSKU(item.sku);
  });
  var cats={};
  sorted.forEach(function(item){var c=item.category||"ไม่ระบุ";if(!cats[c])cats[c]=[];cats[c].push(item);});
  var catKeys=Object.keys(cats).sort();
  var pills='<div class="cat-pill active" onclick="filterCat(\'all\',this)">ทั้งหมด</div>';
  catKeys.forEach(function(cat){
    pills+='<div class="cat-pill" data-cat="'+cat+'" onclick="filterCat(\''+cat.replace(/'/g,"\\'")+'\',this)">'+cat+'</div>';
  });
  document.getElementById("catPills").innerHTML=pills;
  var html="";
  catKeys.forEach(function(cat){
    var sid=cat.replace(/\W/g,"_");
    html+='<section class="cat-sec" id="cs_'+tab+'_'+sid+'" data-cat="'+cat+'">';
    html+='<h2 class="cat-title">📦 '+cat+'<span class="cat-cnt">'+cats[cat].length+' รายการ</span></h2><div class="grid">';
    cats[cat].forEach(function(item){
      var qty=Math.max(0,parseInt(item.qty)||0);
      var zero=qty<=0, low=!zero&&qty<=LOW_QTY;
      var imgTag;
      if(item.imageUrl){
        imgTag='<img src="'+item.imageUrl+'" alt="'+item.sku+'" loading="lazy" onerror="imgErr(this,\''+item.sku+'\')">';
        if(zero) imgTag+='<div class="out-banner">หมด</div>';
      } else { imgTag='<div class="no-img">📷<small>'+item.sku+'</small></div>'; }
      var dC=zero?"dot-zero":low?"dot-low":"dot-ok";
      var sC=zero?"sk-zero":low?"sk-low":"sk-ok";
      var sL=zero?"หมด":low?"⚠️ "+qty+" ชิ้น":"✅ "+qty+" ชิ้น";
      var nH=(item.name&&item.name!==item.sku)?'<div class="card-name">'+item.name+'</div>':'';
      var sk=item.sku.replace(/'/g,"\\'");
      html+='<div class="card" onclick="openLBByIdx(\''+tab.toUpperCase()+'\',\''+item.sku+'\')" data-sku="'+item.sku+'" data-cat="'+cat+'" data-instock="'+(zero?0:1)+'">' +
        '<div class="card-img">'+imgTag+'</div>' +
        '<div class="card-body">' +
          '<div class="card-sku">'+item.sku+'</div>'+nH+
          '<div class="stock-wrap"><span class="dot '+dC+'"></span><span class="stock-label '+sC+'">'+sL+'</span></div>' +
          '<button class="copy-btn" onclick="event.stopPropagation();copySku(\''+sk+'\')">📋 คัดลอก SKU</button>' +
        '</div></div>';
    });
    html+='</div></section>';
  });
  if(roleGte("sale")){
    var noImg=sorted.filter(function(i){return !i.imageUrl;});
    var oos=sorted.filter(function(i){return (parseInt(i.qty)||0)<=0;});
    html+=buildReport(oos,noImg);
  }
  document.getElementById("panel-"+tab).innerHTML=html;
}

// ─── ANALYTICS DASHBOARD ─────────────────────────────────
function renderAnalytics(){
  if(!catalog) return;
  var all=[].concat(catalog["MI"]||[],catalog["KM"]||[],catalog[SCRAP_KEY]||[]);
  var total=all.length;
  var inSt=all.filter(function(i){return (parseInt(i.qty)||0)>0;}).length;
  var outSt=total-inSt;
  var val=all.reduce(function(s,i){return s+((parseInt(i.qty)||0)*(parseFloat(i.price)||0));},0);
  var wImg=all.filter(function(i){return i.imageUrl;}).length;

  // KPI row
  var kpis='<div class="dash-kpi">'+
    _kpi("สินค้าทั้งหมด",total,"รายการ","")+
    _kpi("มีของ / หมด",inSt+" / "+outSt,"รายการ",inSt/total>0.7?"ok":"warn")+
    _kpi("มูลค่าคงคลัง","฿"+_fmt(val),"(ประมาณ)","")+
    _kpi("มีรูปภาพ",wImg+"/"+total,"รายการ",wImg/total>0.7?"ok":"warn")+
  '</div>';

  // category stats
  var cst={};
  all.forEach(function(i){
    var c=i.category||"ไม่ระบุ";
    if(!cst[c]) cst[c]={total:0,in:0,val:0};
    cst[c].total++;
    if((parseInt(i.qty)||0)>0) cst[c].in++;
    cst[c].val+=(parseInt(i.qty)||0)*(parseFloat(i.price)||0);
  });
  var ca=Object.keys(cst).map(function(c){return {c:c,t:cst[c].total,i:cst[c].in,v:cst[c].val};});

  // Stock chart — sort by total
  ca.sort(function(a,b){return b.t-a.t;});
  var mx=ca[0]?ca[0].t:1;
  var stockCh='<div class="chart-box"><div class="chart-ttl">📦 จำนวนสินค้า + Stock แยกหมวด</div>';
  ca.slice(0,16).forEach(function(r){
    var pct=Math.round(r.t/mx*100);
    var ip=r.t>0?Math.round(r.i/r.t*100):0;
    var cls=ip>=70?"ok":ip>=40?"warn":"danger";
    stockCh+='<div class="bar-row">'+
      '<div class="bar-lbl" title="'+r.c+'">'+r.c+'</div>'+
      '<div class="bar-track"><div class="bar-fill '+cls+'" style="width:'+pct+'%"></div></div>'+
      '<div class="bar-num">'+r.i+'/'+r.t+'</div>'+
    '</div>';
  });
  stockCh+='</div>';

  // สัดส่วน มีของ vs หมด (pie-like bar)
  var pieCh='<div class="chart-box"><div class="chart-ttl">📊 สัดส่วน มีของ vs หมด Stock</div>'+
    '<div style="margin-bottom:12px">'+
      '<div style="display:flex;height:28px;border-radius:50px;overflow:hidden;margin-bottom:8px">'+
        '<div style="width:'+Math.round(inSt/total*100)+'%;background:var(--gr);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#000">'+Math.round(inSt/total*100)+'%</div>'+
        '<div style="flex:1;background:var(--re);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff">'+Math.round(outSt/total*100)+'%</div>'+
      '</div>'+
      '<div style="display:flex;gap:20px;font-size:.78rem">'+
        '<span><span style="color:var(--gr)">●</span> มีของ: <b>'+inSt+'</b> รายการ</span>'+
        '<span><span style="color:var(--re)">●</span> หมด: <b>'+outSt+'</b> รายการ</span>'+
      '</div>'+
    '</div></div>';

  // Value chart — sort by value
  ca.sort(function(a,b){return b.v-a.v;});
  var mv=ca[0]?ca[0].v:1;
  var valCh='<div class="chart-box"><div class="chart-ttl">💰 มูลค่าคงคลัง (฿) แยกหมวด</div>';
  ca.slice(0,10).forEach(function(r){
    var pct=Math.round(r.v/mv*100);
    valCh+='<div class="bar-row">'+
      '<div class="bar-lbl" title="'+r.c+'">'+r.c+'</div>'+
      '<div class="bar-track"><div class="bar-fill blue" style="width:'+pct+'%"></div></div>'+
      '<div class="bar-num">฿'+_fmt(r.v)+'</div>'+
    '</div>';
  });
  valCh+='</div>';

  // Top 10 by qty
  var top=all.filter(function(i){return(parseInt(i.qty)||0)>0;})
    .sort(function(a,b){return(parseInt(b.qty)||0)-(parseInt(a.qty)||0);}).slice(0,10);
  var topH='<div class="chart-box"><div class="chart-ttl">🏆 Top 10 สินค้า Stock มากสุด</div>'+
    '<div class="tbl-wrap"><table class="dtbl"><thead><tr><th>#</th><th>SKU</th><th>ชื่อ</th><th>หมวด</th><th>Qty</th><th>ราคา</th><th>มูลค่า</th></tr></thead><tbody>';
  top.forEach(function(i,idx){
    var q=parseInt(i.qty)||0, p=parseFloat(i.price)||0;
    topH+='<tr><td>'+(idx+1)+'</td><td style="font-family:Space Mono,monospace;font-size:.68rem">'+i.sku+'</td>'+
      '<td>'+i.name+'</td><td>'+i.category+'</td>'+
      '<td><span class="tag tag-ok">'+q+'</span></td>'+
      '<td>฿'+p.toLocaleString()+'</td><td>฿'+Math.round(q*p).toLocaleString()+'</td></tr>';
  });
  topH+='</tbody></table></div></div>';

  // Bottom 10 (low stock)
  var bot=all.filter(function(i){var q=parseInt(i.qty)||0;return q>0&&q<=LOW_QTY;})
    .sort(function(a,b){return(parseInt(a.qty)||0)-(parseInt(b.qty)||0);}).slice(0,10);
  var botH='<div class="chart-box"><div class="chart-ttl">⚠️ สินค้าใกล้หมด (≤'+LOW_QTY+' ชิ้น)</div>';
  if(!bot.length) botH+='<div style="color:var(--gr);padding:8px;font-size:.85rem">✅ ไม่มีสินค้าใกล้หมด</div>';
  else {
    botH+='<div class="tbl-wrap"><table class="dtbl"><thead><tr><th>SKU</th><th>ชื่อ</th><th>หมวด</th><th>Qty</th></tr></thead><tbody>';
    bot.forEach(function(i){
      botH+='<tr><td style="font-family:Space Mono,monospace;font-size:.68rem">'+i.sku+'</td><td>'+i.name+'</td><td>'+i.category+'</td>'+
        '<td><span class="tag tag-warn">'+(parseInt(i.qty)||0)+'</span></td></tr>';
    });
    botH+='</tbody></table></div>';
  }
  botH+='</div>';

  document.getElementById("panel-analytics").innerHTML=
    '<div class="sec-title">📊 วิเคราะห์ภาพรวมคลังสินค้า</div>'+
    kpis+pieCh+stockCh+valCh+topH+botH;
}

function _kpi(lbl,val,sub,cls){
  var c=cls==="ok"?"var(--gr)":cls==="warn"?"var(--or)":"var(--tx)";
  return '<div class="kpi-card"><div class="kpi-lbl">'+lbl+'</div>'+
    '<div class="kpi-val" style="color:'+c+'">'+val+'</div>'+
    '<div class="kpi-sub">'+sub+'</div></div>';
}
function _fmt(n){return n>=1000000?(n/1000000).toFixed(1)+"M":n>=1000?Math.round(n/1000)+"K":Math.round(n);}

function renderMasterPanel(){
  var p=document.getElementById("panel-master");
  p.innerHTML='<div style="display:flex;justify-content:center;padding:60px"><div class="spin"></div></div>';
  Promise.all([
    apiCall("getUsers",   {token:authToken}),
    apiCall("getOnline",  {token:authToken}),
    apiCall("getSessions",{token:authToken,limit:150}),
  ]).then(function(rs){
    var ur=rs[0],or=rs[1],sr=rs[2];
    var html='<div class="sec-title">👥 จัดการผู้ใช้งานและระบบ</div>';

    html+='<div class="master-grid">';
    html+=_buildOnlineSection(or.ok?or.online:[]);

function _buildOnlineSection(online){

    '<div class="ms-head"><div class="ms-ttl"><span class="online-dot"></span> Online ตอนนี้ ('+online.length+' คน)</div>'+

function _buildWorkHours(wm){
  var entries=Object.keys(wm).map(function(u){return{u:u,m:wm[u]};}).sort(function(a,b){return b.m-a.m;});
  var maxM=entries[0]?entries[0].m:1;
  var html='<div class="ms-box"><div class="ms-ttl" style="margin-bottom:14px">⏱️ ชั่วโมงการทำงาน (รวมทุก Session)</div>';
  if(!entries.length) html+='<div style="color:var(--mu);font-size:.82rem">ยังไม่มีข้อมูล</div>';
  else entries.slice(0,10).forEach(function(e){
    var h=Math.floor(e.m/60),m=e.m%60;
    var dur=h?h+"ชม. "+m+"น.":m+"น.";
    var pct=Math.round(e.m/maxM*100);
    html+='<div class="wk-row">'+
      '<div class="wk-lbl" title="'+e.u+'">'+e.u+'</div>'+
      '<div class="wk-bar"><div class="wk-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="wk-num">'+dur+'</div>'+
    '</div>';
  });
  html+='</div>';
  return html;
}

function _buildSessionLog(sessions){
  var ev={DUPLICATE_LOGIN:'at-dup',LOGIN:'at-login',LOGOUT:'at-logout'};
  var rl={master:"🟣",admin:"🔵",sale:"🟢",customer:"🟠"};
  var html='<div class="ms-box"><div class="ms-head"><div class="ms-ttl">📋 Session Log (ล่าสุด '+sessions.length+' รายการ)</div></div>'+

  sessions.forEach(function(s){
    var li=s.loginAt?new Date(s.loginAt).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"}):"—";
    var lo=s.logoutAt?new Date(s.logoutAt).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"}):"—";

    var statusTag=s.active
      ? '<span class="alert-tag at-login">🟢 Online</span>'

    html+='<tr>'+
      '<td style="font-family:Space Mono,monospace;font-size:.68rem">'+s.username+'</td>'+
      '<td>'+(rl[s.role]||"⚪")+'</td>'+

      '<td style="font-family:Space Mono,monospace;font-size:.68rem">'+dur+'</td>'+
      '<td>'+statusTag+'</td>'+
    '</tr>';
  });
  html+='</tbody></table></div></div>';
  return html;
}

function openCreateUser(){
  _editingUser=null;
  document.getElementById("modalTtl").textContent="➕ เพิ่ม User ใหม่";
  document.getElementById("mUser").value="";
  document.getElementById("mUser").disabled=false;
  document.getElementById("mPass").value="";
  document.getElementById("mDisplay").value="";
  document.getElementById("mRole").value="sale";
  document.getElementById("modalErr").textContent="";
  document.getElementById("userModal").classList.add("show");
}
function openEditUser(username,display,role){
  _editingUser=username;
  document.getElementById("modalTtl").textContent="✏️ แก้ไข User: "+username;
  document.getElementById("mUser").value=username;
  document.getElementById("mUser").disabled=true;
  document.getElementById("mPass").value="";
  document.getElementById("mDisplay").value=display;
  document.getElementById("mRole").value=role;
  document.getElementById("modalErr").textContent="";
  document.getElementById("userModal").classList.add("show");
}
function closeModal(){
  document.getElementById("userModal").classList.remove("show");
  _editingUser=null;
}
function saveUser(){
  var username=document.getElementById("mUser").value.trim();
  var password=document.getElementById("mPass").value.trim();
  var display=document.getElementById("mDisplay").value.trim();
  var role=document.getElementById("mRole").value;
  var errEl=document.getElementById("modalErr");
  errEl.textContent="";
  if(_editingUser){
    // update
    var body={token:authToken,username:_editingUser,role:role,displayName:display};
    if(password) body.password=password;
    apiCall("updateUser",body)
      .then(function(res){
        if(!res.ok){errEl.textContent=res.error||"เกิดข้อผิดพลาด";return;}
        closeModal(); renderMasterPanel();
        showToast("✅ แก้ไข User เรียบร้อย");
      }).catch(function(e){errEl.textContent=e.message;});
  } else {
    // create
    if(!username||!password){errEl.textContent="กรุณากรอก username และ password";return;}
    apiCall("createUser",{token:authToken,username:username,password:password,role:role,displayName:display||username})
      .then(function(res){
        if(!res.ok){errEl.textContent=res.error||"เกิดข้อผิดพลาด";return;}
        closeModal(); renderMasterPanel();
        showToast("✅ สร้าง User เรียบร้อย");
      }).catch(function(e){errEl.textContent=e.message;});
  }
}
function toggleUser(username){
  apiCall("toggleUser",{token:authToken,username:username})
    .then(function(res){
      if(!res.ok){showToast("❌ "+res.error,"err");return;}
      renderMasterPanel();
      showToast(res.active?"✅ เปิดใช้งาน "+username+"แล้ว":"⛔ ระงับ "+username+" แล้ว");
    }).catch(function(e){showToast("❌ "+e.message,"err");});
}

function switchTab(tab){
  document.getElementById("searchInput").value="";
  document.getElementById("stockOnly").checked=false;
  renderTab(tab);
}
function filterCat(cat,el){
  curCat=cat;
  document.querySelectorAll(".cat-pill").forEach(function(p){p.classList.remove("active");});
  if(el) el.classList.add("active");
  document.getElementById("panel-"+curTab).querySelectorAll(".cat-sec").forEach(function(s){
    s.style.display=(cat==="all"||s.dataset.cat===cat)?"":"none";
  });
  applyFilters();
}
function applyFilters(){
  var q=document.getElementById("searchInput").value.trim().toLowerCase();
  var only=document.getElementById("stockOnly").checked;
  document.getElementById("sfBtn").classList.toggle("active",only);
  document.getElementById("panel-"+curTab).querySelectorAll(".card").forEach(function(c){
    var ok=(!q||(c.dataset.sku||"").toLowerCase().includes(q))
         &&(curCat==="all"||c.dataset.cat===curCat)
         &&(!only||c.dataset.instock==="1");
    c.classList.toggle("hidden",!ok);
  });
  document.getElementById("panel-"+curTab).querySelectorAll(".cat-sec").forEach(function(s){
    var vis=[].some.call(s.querySelectorAll(".card"),function(c){return !c.classList.contains("hidden");});
    s.style.display=vis?"":"none";
  });
}
function reRenderTab(){renderTab(curTab);}

function openLB(item){
  var qty=Math.max(0,parseInt(item.qty)||0),zero=qty<=0,low=!zero&&qty<=LOW_QTY;
  var wrap=document.getElementById("lb-img-wrap");
  if(item.imageUrl){
    wrap.innerHTML='<img src="'+item.imageUrl+'" alt="'+item.sku+'" loading="lazy" onerror="imgErr(this,\''+item.sku+'\')">';
  } else {
    wrap.innerHTML='<div class="lb-no-img">📷<br><small style="font-size:.65rem;font-family:Space Mono,monospace">'+item.sku+'</small></div>';
  }
  document.getElementById("lb-sku").textContent=item.sku;
  document.getElementById("lb-name").textContent=item.name||item.sku;
  document.getElementById("lb-price").textContent="฿"+Number(item.price||0).toLocaleString();
  document.getElementById("lb-cat").textContent="📂 "+(item.category||"");
  var badge=document.getElementById("lb-stock-badge");
  if(roleGte("sale")){
    badge.textContent=zero?"หมดสินค้า":low?"⚠️ "+qty+" ชิ้น":"✅ "+qty+" ชิ้น";
    badge.style.cssText=zero?"background:#ef444420;color:#f87171":
      low?"background:#f9731620;color:#fb923c":"background:#22c55e20;color:#4ade80";
  } else {
    badge.textContent=zero?"● หมด":"● มีสินค้า";
    badge.style.cssText=zero?"background:#ef444420;color:#f87171":"background:#22c55e20;color:#4ade80";
  }
  document.getElementById("lb-overlay").classList.add("on");
}

      "MI-05":"05-เครื่องครัว","MI-06":"06-สแตนเลส","MI-07":"07-เครื่องมือช่าง",
      "MI-08":"08-ทั่วไป","MI-09":"09-ทำความสะอาด"};
    if(m5[s5]) return m5[s5];
    return "01-ของเล่น 20";
  }
  var s4=s.substring(0,4),s3=s.substring(0,3),s2=s.substring(0,2);
  if(s.substring(0,5)==="KM-BC") return "KM-เซรามิก";
  if(s2==="KC") return "KM-เซรามิก";
  if(s2==="KG"||s4==="KM-G") return "KM-แก้ว";
  if(s2==="KS"||s4==="KM-S") return "KM-สแตนเลส";
  if(s2==="KP"||s4==="KM-P") return "KM-พลาสติก food grade";
  if(s2==="KR"||s4==="KM-R") return "KM-ชานอ้อย";
  if(s4==="KM-W") return "KM-ไม้";
  if(s2==="KM") return "KM-โกมลเครื่องครัว";
  var km3=["KCB","KCP","KGC","KCS","KPB","KPM","KPS","KRP","KSP","KSK","KSS","KSZ","KGS","KPU","KSU"];
  if(km3.indexOf(s3)>=0) return "KM";
  if(s.substring(0,1)==="บ") return "สินค้าแปลง";
  return "สินค้าแผนกอื่น";
}

// ─── HELPERS ──────────────────────────────────────────────
function copySku(sku){
  navigator.clipboard.writeText(sku).then(function(){showToast("📋 คัดลอก "+sku+" แล้ว!");});
}
function imgErr(img,sku){
  img.style.display="none";
  var d=document.createElement("div");
  d.className="no-img"; d.innerHTML="📷<small>"+(sku||"")+"</small>";
  img.parentNode.insertBefore(d,img);
}
function showToast(m,type){
  var t=document.getElementById("toast");
  t.textContent=m;
  t.className="toast"+(type?" "+type:"");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2800);
}
function tgl(id){
  var b=document.getElementById(id),a=document.getElementById(id+"-arr");
  if(b&&a) a.textContent=b.classList.toggle("open")?"▲":"▼";
}
