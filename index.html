itchTab('km')"   >🟢 KM    <span class="tab-cnt" id="cnt-km">—</span></button>
    <button class="tab-btn"        id="tab-scrap" onclick="switchTab('scrap')">🟠 งานลังเศษ <span class="tab-cnt" id="cnt-scrap">—</span></button>
  </div>
</div>

<div class="filter-bar">
  <div id="catPills" style="display:flex;gap:8px;flex-wrap:wrap"></div>
  <select class="sort-sel" id="sortSel" onchange="reRenderTab()"><option value="sku">เรียง: รหัส A→Z</option><option value="name">เรียง: ชื่อ</option><option value="price-asc">เรียง: ราคา ↑</option><option value="price-desc">เรียง: ราคา ↓</option><option value="stock-desc">เรียง: Stock มาก</option></select><label class="stock-filter" id="sfBtn">
    <input type="checkbox" id="stockOnly" onchange="applyFilters()"> มีของเท่านั้น
  </label>
</div>

<main class="main">
  <div class="tab-panel active" id="panel-mi"></div>
  <div class="tab-panel"        id="panel-km"></div>
  <div class="tab-panel"        id="panel-scrap"></div>
</main>
<div class="toast" id="toast"></div>

<script>
// ── ตั้งค่า ── ต้องตรงกับ Code_v7.gs ──────────────────────────
var PIN       = "3112";                    // ← ตรงกับ ADMIN_PIN
var DATA_URL  = "data/catalog.json";  // GitHub Pages path
var SCRAP_KEY = "ลงข้อมูล WIP-S26";       // ← ตรงกับ CONFIG.SHEET_SCRAP
var LOW_QTY   = 5;

var catalog = null;
var curTab  = "mi";
var isAdmin = false;
var pinBuf  = "";
var curCat  = "all";

// ── โหลด JSON ────────────────────────────────────────────────
// ── Progress bar simulation ───────────────────────────────────
var _loadStart = Date.now();
var _barPct    = 0;
var _barTimer  = null;
function _tickBar(target, msg) {
  clearInterval(_barTimer);
  _barTimer = setInterval(function() {
    if (_barPct >= target) { clearInterval(_barTimer); return; }
    _barPct = Math.min(_barPct + (target - _barPct) * 0.12 + 0.3, target);
    var pct  = Math.round(_barPct);
    var bar  = document.getElementById("loaderBar");
    var pctEl = document.getElementById("loaderPct");
    var etaEl = document.getElementById("loaderEta");
    if (bar)  bar.style.width  = _barPct + "%";
    if (pctEl) pctEl.textContent = pct + "%";
    if (etaEl && pct < 100) {
      var elapsed = (Date.now() - _loadStart) / 1000;
      var eta     = pct > 5 ? Math.max(0, Math.round(elapsed / pct * (100 - pct))) : null;
      etaEl.textContent = eta !== null ? "เหลืออีกประมาณ " + eta + " วินาที" : "";
    }
    if (msg) document.getElementById("loaderMsg").textContent = msg;
  }, 60);
}
_tickBar(30, "กำลังโหลดข้อมูลสินค้า...");

fetch(DATA_URL + "?t=" + Date.now())
  .then(function(r) {
    _tickBar(60, "กำลังประมวลผลข้อมูล...");
    if (!r.ok) throw new Error("HTTP " + r.status + " — รัน Full Sync ก่อนนะครับ");
    return r.json();
  })
  .then(function(data) {
    _tickBar(85, "กำลังเตรียมแสดงสินค้า...");
    catalog = data;

    setTimeout(function() {
      _tickBar(100, "โหลดเสร็จแล้ว! ✅");
      document.getElementById("loaderEta").textContent = "";
      document.getElementById("loaderPct").textContent = "100%";

      // แสดงเวลา
      if (data.updatedAt) {
        var d = new Date(data.updatedAt);
        document.getElementById("updatedAt").textContent =
          d.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+
          d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
      }

      // จำนวนสินค้า
      document.getElementById("cnt-mi").textContent    = (data["MI"]      ||[]).length;
      document.getElementById("cnt-km").textContent    = (data["KM"]      ||[]).length;
      document.getElementById("cnt-scrap").textContent = (data[SCRAP_KEY] ||[]).length;

      setTimeout(function() {
        document.getElementById("loader").style.display = "none";
        document.getElementById("pinModal").classList.add("show");
      }, 400);
    }, 300);
  })
  .catch(function(e) {
    clearInterval(_barTimer);
    var el = document.getElementById("loaderMsg");
    el.textContent = "⚠️ " + e.message;
    el.style.color = "#f87171";
    document.getElementById("loaderPct").textContent = "";
    document.getElementById("loaderEta").textContent = "";
  });

// ── Render tab ────────────────────────────────────────────────
function renderTab(tab) {
  curTab = tab; curCat = "all";
  var colors = {mi:"#3b82f6", km:"#22c55e", scrap:"#f97316"};
  document.documentElement.style.setProperty("--tab-ac", colors[tab]);

  ["mi","km","scrap"].forEach(function(t) {
    document.getElementById("tab-"+t).classList.toggle("active", t===tab);
    document.getElementById("panel-"+t).classList.toggle("active", t===tab);
  });

  // ดึงข้อมูล — key ตรงกับที่ Apps Script push
  var rawKey = tab==="scrap" ? SCRAP_KEY : tab.toUpperCase();
  var items  = (catalog && catalog[rawKey]) || [];

  if (!items.length) {
    document.getElementById("panel-"+tab).innerHTML =
      "<div class='empty-msg'>ไม่มีข้อมูลสินค้า<br><small style='color:var(--mu)'>รัน Full Sync ใน Apps Script ก่อน</small></div>";
    document.getElementById("catPills").innerHTML = "";
    return;
  }

  // เรียง
  var sortBy = (document.getElementById("sortSel")||{value:"sku"}).value;
  var sorted = items.slice().sort(function(a,b){
    if(sortBy==="name") return (a.name||"").localeCompare(b.name||"","th");
    if(sortBy==="price-asc") return (a.price||0)-(b.price||0);
    if(sortBy==="price-desc") return (b.price||0)-(a.price||0);
    if(sortBy==="stock-desc") return (b.qty||0)-(a.qty||0);
    return (a.sku||"").localeCompare(b.sku||"",undefined,{numeric:true});
  });
  // auto-fill category จาก SKU ถ้า category = "ไม่ระบุ" หรือว่าง
  sorted.forEach(function(item){
    if(!item.category||item.category==="ไม่ระบุ") item.category=categorizeSKU(item.sku);
  });

  // จัดกลุ่ม category
  var cats = {};
  sorted.forEach(function(item){
    var c = item.category||"ไม่ระบุ";
    if(!cats[c]) cats[c]=[];
    cats[c].push(item);
  });
  var catKeys = Object.keys(cats).sort();

  // Category pills
  var pills = '<div class="cat-pill active" onclick="filterCat(\'all\',this)">ทั้งหมด</div>';
  catKeys.forEach(function(cat){
    pills += '<div class="cat-pill" data-cat="'+cat+'" onclick="filterCat(\''+cat.replace(/'/g,"\\'")+ '\',this)">'+cat+'</div>';
  });
  document.getElementById("catPills").innerHTML = pills;

  // Cards
  var html = "";
  catKeys.forEach(function(cat){
    var sid = cat.replace(/\W/g,"_");
    html += '<section class="cat-sec" id="cs_'+tab+'_'+sid+'" data-cat="'+cat+'">';
    html += '<h2 class="cat-title">📦 '+cat+'<span class="cat-cnt">'+cats[cat].length+' รายการ</span></h2>';
    html += '<div class="grid">';

    cats[cat].forEach(function(item){
      var qty  = parseInt(item.qty) || 0;
      var zero = qty <= 0;
      var low  = !zero && qty <= LOW_QTY;

      // ── รูปภาพ ── ใช้ imageUrl จาก JSON โดยตรง ──
      var imgTag;
      if (item.imageUrl) {
        imgTag = '<img src="'+item.imageUrl+'" alt="'+item.sku+'" loading="lazy" onerror="imgErr(this,\''+item.sku+'\')">';
        if (zero) imgTag += '<div class="out-banner">หมด</div>';
      } else {
        imgTag = '<div class="no-img">📷<small>'+item.sku+'</small></div>';
      }

      var dotC  = zero?"dot-zero": low?"dot-low":"dot-ok";
      var skC   = zero?"sk-zero" : low?"sk-low" :"sk-ok";
      var skLbl = zero?"หมด"      : low?"⚠️ "+qty+" ชิ้น":"✅ "+qty+" ชิ้น";
      var nameH = (item.name && item.name!==item.sku)
        ? '<div class="card-name">'+item.name+'</div>' : '';
      var skuS  = item.sku.replace(/'/g,"\\'");

      html +=
        '<div class="card" onclick="openLBByIdx(\''+(tab.toUpperCase()||curTab.toUpperCase())+'\',\''+ item.sku+'\')" data-sku="'+item.sku+'" data-cat="'+cat+'" data-instock="'+(zero?0:1)+'">' +
          '<div class="card-img">'+imgTag+'</div>' +
          '<div class="card-body">' +
            '<div class="card-sku">'+item.sku+'</div>' +
            nameH +
            '<div class="stock-wrap">' +
              '<span class="dot '+dotC+'"></span>' +
              '<span class="stock-label '+skC+'">'+skLbl+'</span>' +
            '</div>' +
            '<button class="copy-btn" onclick="copySku(\''+skuS+'\')">📋 คัดลอก SKU</button>' +
          '</div>' +
        '</div>';
    });
    html += '</div></section>';
  });

  // Report (admin only)
  var noImg  = sorted.filter(function(i){ return !i.imageUrl; });
  var outOfS = sorted.filter(function(i){ return (parseInt(i.qty)||0)<=0; });
  html += buildReport(outOfS, noImg);

  document.getElementById("panel-"+tab).innerHTML = html;
}

function buildReport(outOfS, noImg) {
  var h = '<div class="report-wrap"><div class="rpt-head">📋 รายงานสถานะสินค้า</div>';
  h += '<div class="rpt-toggle" onclick="tgl(\'oos\')"><h3>❌ สินค้าหมด Stock <span class="rpt-cnt">'+outOfS.length+' รายการ</span></h3><span id="oos-arr">▼</span></div>';
  h += '<div class="rpt-body" id="oos">';
  if (!outOfS.length) { h += '<div class="rpt-empty">✅ ไม่มีสินค้าหมด</div>'; }
  else {
    h += '<table class="rpt-table"><thead><tr><th>SKU</th><th>ชื่อ</th><th>Qty</th></tr></thead><tbody>';
    outOfS.forEach(function(i){ h+='<tr><td>'+i.sku+'</td><td style="font-family:Sarabun,sans-serif;font-size:.78rem">'+i.name+'</td><td>'+i.qty+'</td></tr>'; });
    h += '</tbody></table>';
  }
  h += '</div>';
  h += '<div class="rpt-toggle" style="margin-top:8px" onclick="tgl(\'nim\')"><h3>📷 มี Stock แต่ไม่มีรูป <span class="rpt-cnt">'+noImg.length+' รายการ</span></h3><span id="nim-arr">▼</span></div>';
  h += '<div class="rpt-body" id="nim">';
  if (!noImg.length) { h += '<div class="rpt-empty">✅ ทุกรายการมีรูปครบ</div>'; }
  else {
    h += '<table class="rpt-table"><thead><tr><th>SKU</th><th>ชื่อ</th><th>Qty</th></tr></thead><tbody>';
    noImg.forEach(function(i){ h+='<tr><td>'+i.sku+'</td><td style="font-family:Sarabun,sans-serif;font-size:.78rem">'+i.name+'</td><td>'+i.qty+'</td></tr>'; });
    h += '</tbody></table>';
  }
  h += '</div></div>';
  return h;
}


// ── Auto-categorize จาก SKU prefix ────────────────────────────
function categorizeSKU(sku) {
  var s = String(sku||"");
  if (!s) return "ไม่ระบุ";
  if (s.substring(0,3)==="KSB") return "เป่าลม";
  if (s.substring(0,3)==="MI-") {
    var s9=s.substring(0,9);
    if(s9==="MI-010001"||s9==="MI-010002"||s9==="MI-010003") return "09-ทำความสะอาด";
    var s8=s.substring(0,8);
    if(["MI-B0611","MI-B0614","MI-B0815","MI-B0816","MI-B0918","MI-B1220"].indexOf(s8)>=0) return "04-พลาสติก";
    var s7=s.substring(0,7);
    if(s7==="MI-TAPE") return "03-เครื่องเขียน";
    var s6=s.substring(0,6);
    if(s6==="MI-CUP") return "05-เครื่องครัว";
    if(s6==="MI-EAJ") return "07-เครื่องมือช่าง";
    if(s6==="MI-STS") return "06-สแตนเลส";
    var s5=s.substring(0,5);
    var m5={"MI-88":"สินค้าเทศกาล","MI-37":"07-เครื่องมือช่าง","MI-17":"07-เครื่องมือช่าง",
      "MI-13":"03-เครื่องเขียน","MI-12":"02-กิ๊ฟช็อบ","MI-AP":"02-กิ๊ฟช็อบ",
      "MI-CN":"09-ทำความสะอาด","MI-EK":"04-พลาสติก","MI-GR":"08-ทั่วไป",
      "MI-PP":"PETPARTY","MI-PT":"04-พลาสติก","MI-RD":"01-ของเล่น 20",
      "MI-SP":"02-กิ๊ฟช็อบ","MI-TN":"07-เครื่องมือช่าง","MI-TY":"01-ของเล่น 20",
      "MI-SR":"03-เครื่องเขียน","MI-00":"00-สัตว์เลี้ยง","MI-01":"01-ของเล่น 20",
      "MI-02":"02-กิ๊ฟช็อบ","MI-03":"03-เครื่องเขียน","MI-04":"04-พลาสติก",
      "MI-05":"05-เครื่องครัว","MI-06":"06-สแตนเลส","MI-07":"07-เครื่องมือช่าง",
      "MI-08":"08-ทั่วไป","MI-09":"09-ทำความสะอาด"};
    if(m5[s5]) return m5[s5];
    return "01-ของเล่น 20";
  }
  // KM logic
  var s4=s.substring(0,4), s3=s.substring(0,3), s2=s.substring(0,2);
  if(s.substring(0,5)==="KM-BC") return "KM-เซรามิก";
  if(s2==="KC") return "KM-เซรามิก";
  if(s2==="KG"||s4==="KM-G") return "KM-แก้ว";
  if(s2==="KS"||s4==="KM-S") return "KM-สแตนเลส";
  if(s2==="KP"||s4==="KM-P") return "KM-พลาสติก food grade";
  if(s2==="KR"||s4==="KM-R") return "KM-ชานอ้อย";
  if(s4==="KM-W") return "KM-ไม้";
  if(s2==="KM") return "KM-โกมลเครื่องครัว";
  var km3=["KCB","KCP","KGC","KCS","KPB","KPM","KPS","KRP","KSP","KSK","KSS","KSZ","KGS","KPU","KSU"];
  if(km3.indexOf(s3)>=0) return "KM";
  if(s.substring(0,1)==="บ") return "สินค้าแปลง";
  return "สินค้าแผนกอื่น";
}

// ── Re-render with new sort ───────────────────────────────────
function reRenderTab() { renderTab(curTab); }

// ── Lightbox ──────────────────────────────────────────────────
function openLB(item) {
  var qty = parseInt(item.qty)||0;
  var zero = qty<=0, low = !zero && qty<=LOW_QTY;
  // image
  var wrap = document.getElementById("lb-img-wrap");
  if (item.imageUrl) {
    wrap.innerHTML = '<img src="'+item.imageUrl+'" alt="'+item.sku+'" loading="lazy" onerror="imgErr(this,\''+item.sku+'\')">';
  } else {
    wrap.innerHTML = '<div class="lb-no-img">📷<br><small style=\"font-size:.65rem;font-family:Space Mono,monospace\">'+item.sku+'</small></div>';
  }
  document.getElementById("lb-sku").textContent  = item.sku;
  document.getElementById("lb-name").textContent = item.name||item.sku;
  document.getElementById("lb-price").textContent= "฿"+Number(item.price||0).toLocaleString();
  document.getElementById("lb-cat").textContent  = "📂 "+(item.category||"");
  var badge = document.getElementById("lb-stock-badge");
  if (isAdmin) {
    badge.textContent = zero?"หมดสินค้า": low?"⚠️ "+qty+" ชิ้น":"✅ "+qty+" ชิ้น";
    badge.style.cssText = zero?"background:#ef444420;color:#f87171":
      low?"background:#f9731620;color:#fb923c":
          "background:#22c55e20;color:#4ade80";
  } else {
    badge.textContent = zero?"● หมด":"● มีสินค้า";
    badge.style.cssText = zero?"background:#ef444420;color:#f87171":"background:#22c55e20;color:#4ade80";
  }
  document.getElementById("lb-overlay").classList.add("on");
}

function openLBByIdx(tabKey, sku) {
  var rawKey = tabKey==="SCRAP" ? SCRAP_KEY : tabKey;
  var items = (catalog && catalog[rawKey])||[];
  var item  = null;
  for(var i=0;i<items.length;i++) { if(items[i].sku===sku){item=items[i];break;} }
  if(item) openLB(item);
}
function closeLB() { document.getElementById("lb-overlay").classList.remove("on"); }
function lbBg(e) { if(e.target.id==="lb-overlay") closeLB(); }

// ── Switch tab ────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById("searchInput").value = "";
  document.getElementById("stockOnly").checked = false;
  renderTab(tab);
}

// ── Category filter ───────────────────────────────────────────
function filterCat(cat, el) {
  curCat = cat;
  document.querySelectorAll(".cat-pill").forEach(function(p){ p.classList.remove("active"); });
  if (el) el.classList.add("active");
  document.getElementById("panel-"+curTab).querySelectorAll(".cat-sec").forEach(function(s){
    s.style.display = (cat==="all"||s.dataset.cat===cat) ? "" : "none";
  });
  applyFilters();
}

// ── Search + stock filter ─────────────────────────────────────
function applyFilters() {
  var q         = document.getElementById("searchInput").value.trim().toLowerCase();
  var stockOnly = document.getElementById("stockOnly").checked;
  document.getElementById("sfBtn").classList.toggle("active", stockOnly);
  document.getElementById("panel-"+curTab).querySelectorAll(".card").forEach(function(c){
    var ok = (!q || c.dataset.sku.toLowerCase().includes(q))
          && (curCat==="all" || c.dataset.cat===curCat)
          && (!stockOnly || c.dataset.instock==="1");
    c.classList.toggle("hidden", !ok);
  });
  document.getElementById("panel-"+curTab).querySelectorAll(".cat-sec").forEach(function(s){
    var vis = [].some.call(s.querySelectorAll(".card"),function(c){return !c.classList.contains("hidden");});
    s.style.display = vis ? "" : "none";
  });
}

// ── Helpers ───────────────────────────────────────────────────
function copySku(sku) {
  navigator.clipboard.writeText(sku).then(function(){ showToast("📋 คัดลอก "+sku+" แล้ว!"); });
}
function imgErr(img, sku) {
  img.style.display = "none";
  var d = document.createElement("div");
  d.className = "no-img";
  d.innerHTML = "📷<small>"+(sku||"")+"</small>";
  img.parentNode.insertBefore(d, img);
}
function showToast(m) {
  var t = document.getElementById("toast");
  t.textContent = m; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}
function tgl(id) {
  var b=document.getElementById(id),a=document.getElementById(id+"-arr");
  if(b&&a) a.textContent=b.classList.toggle("open")?"▲":"▼";
}

// ── PIN ───────────────────────────────────────────────────────
function togglePin() {
  if (isAdmin) { exitAdmin(); return; }
  pinBuf = ""; renderDots();
  document.getElementById("pinErr").textContent = "";
  document.getElementById("pinModal").classList.add("show");
}
function skipPin() {
  document.getElementById("pinModal").classList.remove("show");
  renderTab("mi");
}
function pk(k) {
  var err = document.getElementById("pinErr");
  err.textContent = "";
  if (k==="C")   { pinBuf=""; renderDots(); return; }
  if (k==="DEL") { pinBuf=pinBuf.slice(0,-1); renderDots(); return; }
  if (pinBuf.length>=4) return;
  pinBuf+=k; renderDots();
  if (pinBuf.length===4) {
    if (pinBuf===PIN) {
      isAdmin=true;
      document.getElementById("pinModal").classList.remove("show");
      document.body.classList.add("admin-mode");
      var mb=document.getElementById("modeBadge");
      mb.textContent="🔑 Admin"; mb.className="mode-badge admin";
      renderTab("mi");
      showToast("✅ Admin Mode — เห็นจำนวน Stock ทั้งหมด");
    } else {
      err.textContent="รหัสไม่ถูกต้อง"; pinBuf=""; renderDots();
    }
  }
}
function renderDots() {
  for(var i=0;i<4;i++) document.getElementById("pd"+i).className="pin-dot"+(i<pinBuf.length?" filled":"");
}
function exitAdmin() {
  isAdmin=false; document.body.classList.remove("admin-mode");
  var mb=document.getElementById("modeBadge");
  mb.textContent="👁 Viewer"; mb.className="mode-badge viewer";
  showToast("🔒 กลับสู่ Viewer Mode");
}
</script>
</body>
</html>
